# k8s/deployment.yaml
# Deploys the legal-review SLM inference server.
# Requires a GPU node pool labelled: accelerator=nvidia-a10g
#
# Apply:  kubectl apply -f k8s/
# ─────────────────────────────────────────────────────────────────────────────

apiVersion: apps/v1
kind: Deployment
metadata:
  name: legal-slm-server
  namespace: ai-inference
  labels:
    app: legal-slm
    version: v1
    tier: inference
spec:
  replicas: 2                     # Start with 2; HPA will scale 2–8
  selector:
    matchLabels:
      app: legal-slm
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0           # Zero-downtime rolling updates
  template:
    metadata:
      labels:
        app: legal-slm
        version: v1
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: "/metrics"
        prometheus.io/port: "8000"
    spec:
      # ── Scheduling ───────────────────────────────────────────────────────
      nodeSelector:
        accelerator: nvidia-a10g  # Target GPU node pool

      tolerations:
        - key: "nvidia.com/gpu"
          operator: "Exists"
          effect: "NoSchedule"

      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              app: legal-slm

      # ── Init: warm up model cache ─────────────────────────────────────────
      initContainers:
        - name: model-downloader
          image: huggingface/downloader:latest
          command:
            - python
            - -c
            - |
              from huggingface_hub import snapshot_download
              snapshot_download(
                  repo_id="$(MODEL_ID)",
                  local_dir="/model-cache",
                  token="$(HF_TOKEN)",
              )
          env:
            - name: MODEL_ID
              valueFrom:
                configMapKeyRef:
                  name: legal-slm-config
                  key: MODEL_ID
            - name: HF_TOKEN
              valueFrom:
                secretKeyRef:
                  name: legal-slm-secrets
                  key: HF_TOKEN
          volumeMounts:
            - name: model-cache
              mountPath: /model-cache

      # ── Main container ────────────────────────────────────────────────────
      containers:
        - name: inference-server
          image: your-registry/legal-slm-server:1.0.0   # Replace with your image
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP

          env:
            - name: MODEL_ID
              valueFrom:
                configMapKeyRef:
                  name: legal-slm-config
                  key: MODEL_ID
            - name: HF_TOKEN
              valueFrom:
                secretKeyRef:
                  name: legal-slm-secrets
                  key: HF_TOKEN
            - name: MAX_TOKENS
              value: "1024"
            - name: TEMPERATURE
              value: "0.1"
            - name: TENSOR_PARALLEL_SIZE
              value: "1"
            - name: TRANSFORMERS_CACHE
              value: /model-cache
            - name: HF_HOME
              value: /model-cache

          resources:
            requests:
              memory: "20Gi"
              cpu: "4"
              nvidia.com/gpu: "1"
            limits:
              memory: "28Gi"
              cpu: "8"
              nvidia.com/gpu: "1"

          # ── Probes ─────────────────────────────────────────────────────
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 15
            failureThreshold: 3

          readinessProbe:
            httpGet:
              path: /ready
              port: 8000
            initialDelaySeconds: 90       # Allow model load time
            periodSeconds: 10
            failureThreshold: 6

          startupProbe:
            httpGet:
              path: /health
              port: 8000
            failureThreshold: 30          # 30 × 10s = 5 min to load model
            periodSeconds: 10

          volumeMounts:
            - name: model-cache
              mountPath: /model-cache
            - name: shm                   # Shared memory for torch multiprocessing
              mountPath: /dev/shm

      # ── Volumes ───────────────────────────────────────────────────────────
      volumes:
        - name: model-cache
          persistentVolumeClaim:
            claimName: model-cache-pvc
        - name: shm
          emptyDir:
            medium: Memory
            sizeLimit: 8Gi

      # ── Image pull secrets ────────────────────────────────────────────────
      imagePullSecrets:
        - name: registry-credentials

      terminationGracePeriodSeconds: 60
